  const modal = document.getElementById("add-task-modal");

  if (currentFilter === "inbox") {
    // Inbox: hide area/section fields — task goes straight to inbox
    document.getElementById("mt-area").closest(".modal-field-col").style.display = "none";
    document.getElementById("mt-section").closest(".modal-field-col").style.display = "none";
  } else {
    document.getElementById("mt-area").closest(".modal-field-col").style.display = "";
    document.getElementById("mt-section").closest(".modal-field-col").style.display = "";

    // Pre-populate from current context
    let preferArea    = "shop";
    let preferSection = null;
    if (currentFilter === "__sec__" && currentSectionCtx) {
      preferArea    = currentSectionCtx.area;
      preferSection = currentSectionCtx.name;
    } else if (isAreaFilter(currentFilter)) {
      preferArea = currentFilter;
    } else if (["shop","design","personal"].includes(currentFilter)) {
      preferArea = currentFilter;
    }

    rebuildAreaSelect(preferArea);
    populateSections();
    if (preferSection) {
      const sec = document.getElementById("mt-section");
      // Set if option exists, otherwise leave first option selected
      if ([...sec.options].some(o => o.value === preferSection)) {
        sec.value = preferSection;
      }
    }
  }

  modal.classList.add("open");
  document.getElementById("mt-save").disabled = true;
  setTimeout(() => document.getElementById("mt-title").focus(), 30);
}

function closeAddTask() {
  document.getElementById("add-task-modal").classList.remove("open");
  document.getElementById("mt-title").value = "";
  document.getElementById("mt-title").readOnly = false;
  document.getElementById("mt-title").style.color = "";
  document.getElementById("nl-preview").innerHTML = "";
  document.getElementById("mt-notes").value = "";
  document.getElementById("new-area-row").classList.remove("visible");
  document.getElementById("new-section-row").classList.remove("visible");
  const saveBtn = document.getElementById("mt-save");
  saveBtn.textContent = "Add Task";
  saveBtn.disabled = true;
  editingTaskId = null;
  modalDueDate  = null;
  modalRecur    = null;
  modalPriority = null;
  modalDefer    = null;
  modalSubtasks = [];
  renderModalSubtasks();
  updateWhenTrigger();
  updateRepeatTrigger();
  setModalPriority('');
  updateDeferTrigger();
  document.getElementById("repeat-picker").classList.remove("open");
  document.getElementById("defer-picker").classList.remove("open");
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById("add-task-modal")) closeAddTask();
}

function handleModalKey(e) {
  if (e.key === "Escape") { closeAddTask(); return; }
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { saveNewTask(); return; }
}

let editingTaskId = null;

function openEditTask(id) {
  loadCustomMeta();
  const t = allTasks().find(t => t.id === id);
  if (!t) return;
  editingTaskId = id;

  const isDynamic = !!t._dynamic;
  const titleEl = document.getElementById("mt-title");
  titleEl.value = t.title;
  titleEl.readOnly = !isDynamic;
  titleEl.style.color = isDynamic ? "" : "var(--label2)";

  document.getElementById("mt-notes").value = state[id]?.note || t.detail || "";

  // Area / section — always shown, using overrides if present
  const areaCol    = document.getElementById("mt-area").closest(".modal-field-col");
  const sectionCol = document.getElementById("mt-section").closest(".modal-field-col");
  areaCol.style.display    = "";
  sectionCol.style.display = "";
  const effectiveArea    = state[id]?.areaOverride    || t.area;
  const effectiveSection = state[id]?.sectionOverride || t.section;
  rebuildAreaSelect(effectiveArea);
  populateSections();
  document.getElementById("mt-area").value    = effectiveArea;
  document.getElementById("mt-section").value = effectiveSection;

  // Due date
  modalDueDate = state[id]?.due || null;
  updateWhenTrigger();

  // Recurrence
  modalRecur = state[id]?.recur || null;
  updateRepeatTrigger();

  // Priority
  modalPriority = state[id]?.priority || null;
  setModalPriority(modalPriority || '');

  // Defer
  modalDefer = state[id]?.defer || null;
  updateDeferTrigger();

  // Subtasks — static (read-only) + dynamic (editable)
  modalSubtasks = [...(state[id]?.dynamicSubtasks || [])];
  renderModalSubtasks(t.subtasks || []);

  const saveBtn = document.getElementById("mt-save");
  saveBtn.textContent = "Save";
  saveBtn.disabled = false;

  document.getElementById("add-task-modal").classList.add("open");
  setTimeout(() => titleEl.focus(), 30);
}

function saveTaskModal() {
  if (editingTaskId) {
    saveEditTask();
  } else {
    saveNewTask();
  }
}

function saveEditTask() {
  const id = editingTaskId;
  const t  = allTasks().find(t => t.id === id);
  if (!t) { closeAddTask(); return; }

  const newArea    = document.getElementById("mt-area").value;
  const newSection = document.getElementById("mt-section").value;
  const newNotes   = document.getElementById("mt-notes").value.trim();

  if (t._dynamic) {
    const idx = dynamicTasks.findIndex(d => d.id === id);
    if (idx > -1) {
      dynamicTasks[idx].title   = document.getElementById("mt-title").value.trim() || dynamicTasks[idx].title;
      dynamicTasks[idx].detail  = newNotes;
      dynamicTasks[idx].area    = newArea;
      dynamicTasks[idx].section = newSection;
      saveDynamicTasks();
    }
  } else {
    // Static task: store overrides + notes in state
    // Only save note if it differs from the built-in detail (avoids duplicate display)
    const cleanNote = (newNotes === (t.detail || "")) ? "" : newNotes;
    state[id] = { ...(state[id] || {}), note: cleanNote };
    if (!cleanNote) delete state[id].note;
    if (newArea    !== t.area)    state[id].areaOverride    = newArea;
    else                          delete state[id].areaOverride;
    if (newSection !== t.section) state[id].sectionOverride = newSection;
    else                          delete state[id].sectionOverride;
  }

  // Due date
  const todaySaveStr = new Date().toLocaleDateString("en-CA");
  if (modalDueDate) {
    state[id] = { ...(state[id] || {}), due: modalDueDate };
    if (modalDueDate === todaySaveStr) state[id].today = true;
  } else {
    if (state[id]) { delete state[id].due; }
  }
  // Recurrence
  if (modalRecur) state[id] = { ...(state[id] || {}), recur: modalRecur };
  else if (state[id]) delete state[id].recur;
  // Priority
  if (modalPriority) state[id] = { ...(state[id] || {}), priority: modalPriority };
  else if (state[id]) delete state[id].priority;
  // Defer
  if (modalDefer) state[id] = { ...(state[id] || {}), defer: modalDefer };
  else if (state[id]) delete state[id].defer;
  // Dynamic subtasks
  state[id] = { ...(state[id] || {}) };
  if (modalSubtasks.length) state[id].dynamicSubtasks = modalSubtasks;
  else delete state[id].dynamicSubtasks;

  saveState(); schedPush();
  closeAddTask();
  render();
}

function saveNewTask() {
  const title = document.getElementById("mt-title").value.trim();
  if (!title) return;
  const isInbox = currentFilter === "inbox";
  const area    = isInbox ? "inbox" : document.getElementById("mt-area").value;
  const section = isInbox ? "Inbox" : (document.getElementById("mt-section").value || sectionsForArea(area)[0] || "Other");
  const detail  = document.getElementById("mt-notes").value.trim();

  const newTask = {
    id: "dyn-" + Date.now(),
    area, section, title, detail,
    tags: [], subtasks: [], _dynamic: true
  };
  dynamicTasks.push(newTask);
  saveDynamicTasks();

  const todaySaveStr = new Date().toLocaleDateString("en-CA");
  const taskState = {};
  if (currentFilter === "today") taskState.today = true;
  if (modalDueDate) {
    taskState.due = modalDueDate;
    if (modalDueDate === todaySaveStr) taskState.today = true;
  }
  if (modalRecur)    taskState.recur    = modalRecur;
  if (modalPriority) taskState.priority = modalPriority;
  if (modalDefer)    taskState.defer    = modalDefer;
  if (Object.keys(taskState).length) { state[newTask.id] = taskState; saveState(); }

  modalDueDate  = null;
  modalRecur    = null;
  modalPriority = null;
  modalDefer    = null;
  updateWhenTrigger();
  closeAddTask();
  render();
}

function saveState() {
  try { localStorage.setItem("tasks-v2", JSON.stringify(state)); } catch(e) {}
}

function toggleTask(id) {
  if (state[id]?.completed) {
    // Uncomplete — instant, no animation needed
    const s = { ...(state[id] || {}) };
    delete s.completed; delete s.completedAt;
    state[id] = Object.keys(s).length ? s : undefined;
    if (!state[id]) delete state[id];
    saveState(); schedPush(); render();
  } else {
    // Completing — play satisfaction animation first
    const row = document.getElementById("trow-" + id);
    if (row) {
      row.classList.add("completing");
      // Turn the check circle green immediately
      const circle = row.querySelector(".check-circle");
      if (circle) { circle.style.background = "var(--green)"; circle.style.borderColor = "var(--green)"; }
      // Short pause on green, then slide-fade out
      setTimeout(() => {
        row.classList.add("fade-out");
        setTimeout(() => {
          const recur = state[id]?.recur;
          state[id] = { ...(state[id] || {}), completed: true, completedAt: new Date().toLocaleDateString("en-CA") };
          if (recur) spawnNextRecurrence(id);
          saveState(); schedPush(); render();
        }, 380);
      }, 420);
    } else {
      // Fallback (e.g. logbook view)
      const recur = state[id]?.recur;
      state[id] = { ...(state[id] || {}), completed: true, completedAt: new Date().toLocaleDateString("en-CA") };
      if (recur) spawnNextRecurrence(id);
      saveState(); schedPush(); render();
    }
  }
}

function calcNextDue(fromDate, recur) {
  const today = new Date(); today.setHours(0,0,0,0);
  const base  = fromDate ? new Date(fromDate + "T00:00:00") : today;
  const d     = new Date(base < today ? today : base);
  switch(recur) {
    case "daily":    d.setDate(d.getDate() + 1);       break;
    case "weekly":   d.setDate(d.getDate() + 7);       break;
    case "biweekly": d.setDate(d.getDate() + 14);      break;
    case "monthly":  d.setMonth(d.getMonth() + 1);     break;
    case "yearly":   d.setFullYear(d.getFullYear()+1); break;
  }
  return d.toLocaleDateString("en-CA");
}

function spawnNextRecurrence(id) {
  const t = allTasks().find(t => t.id === id);
  if (!t) return;
  const recur   = state[id]?.recur;
  const nextDue = calcNextDue(state[id]?.due || null, recur);
  const todayStr = new Date().toLocaleDateString("en-CA");
  const newTask = {
    id: "recur-" + Date.now(),
    title:   t._dynamic ? t.title   : (state[id]?.titleOverride || t.title),
    detail:  t._dynamic ? (t.detail||"") : (state[id]?.note || t.detail || ""),
    area:    state[id]?.areaOverride    || t.area,
    section: state[id]?.sectionOverride || t.section,
    tags: [], subtasks: [], _dynamic: true
  };
  dynamicTasks.push(newTask);
  saveDynamicTasks();
  state[newTask.id] = { due: nextDue, recur };
  if (nextDue === todayStr) state[newTask.id].today = true;
}

function toggleToday(id) {
  if (state[id]?.today) { const s = {...state[id]}; delete s.today; state[id] = Object.keys(s).length ? s : undefined; if (!state[id]) delete state[id]; }
  else state[id] = { ...(state[id]||{}), today: true };
  saveState(); render();
}

function toggleNote(id) {
  const open = !state[id]?.noteOpen;
  state[id] = { ...(state[id]||{}), noteOpen: open };
  saveState(); render();
  if (open) setTimeout(() => { const el = document.getElementById('note-'+id); if(el) el.focus(); }, 30);
}

function saveNote(id, val) {
  state[id] = { ...(state[id]||{}), note: val };
  saveState();
}

function toggleSubtaskInput(id) {
  const open = !state[id]?.subtaskInput;
  state[id] = { ...(state[id]||{}), subtaskInput: open };
  if (open) state[id+'__open'] = true;
  saveState(); render();
  if (open) setTimeout(() => { const el = document.getElementById('newsub-'+id); if(el) el.focus(); }, 30);
}

function confirmNewSubtask(id) {
  const el = document.getElementById('newsub-'+id);
  if (!el) return;
  const val = el.value.trim();
  if (val) {
    const existing = state[id]?.dynamicSubtasks || [];
    state[id] = { ...(state[id]||{}), dynamicSubtasks: [...existing, val], subtaskInput: false };
    saveState(); render();
  } else { toggleSubtaskInput(id); }
}

function removeDynamicSubtask(id, idx) {
  const arr = [...(state[id]?.dynamicSubtasks || [])];
  arr.splice(idx, 1);
  state[id] = { ...(state[id]||{}), dynamicSubtasks: arr };
  saveState(); render();
}

function toggleDynSubtask(taskId, idx) {
  const key = taskId + "__dynsub__" + idx;
  if (state[key]?.completed) delete state[key];
  else state[key] = { completed: true, completedAt: new Date().toLocaleDateString("en-CA") };
  saveState(); render();
}

function toggleSubtask(taskId, idx) {
  const key = taskId + "__sub__" + idx;
  if (state[key]?.completed) delete state[key];
  else state[key] = { completed:true, completedAt: new Date().toLocaleDateString("en-CA") };
  saveState(); render();
}

function toggleSubtasks(taskId) {
  const key = taskId + "__open";
  if (state[key]) delete state[key];
  else state[key] = true;
  saveState(); render();
}

function isAreaFilter(f) {
  return ['shop','design','personal'].includes(f) || customAreas.some(a => a.id === f);
}

function setFilter(f, btn) {
  // Clear search if active
  document.getElementById("search-bar").classList.remove("visible");
  document.getElementById("search-input").value = "";
  currentFilter = f;
  currentSectionCtx = null;
  navStack = [];
  document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  // Title
  let title = VIEW_TITLES[f];
  if (!title) {
    const ca = customAreas.find(a => a.id === f);
    title = ca ? ca.label : f;
  }
  document.getElementById('view-title').textContent = title;

  // Show/hide panels
  const panels = { 'task-content': false, 'logbook-panel': false, 'upcoming-panel': false };
  if      (f === 'logbook')  panels['logbook-panel']  = true;
  else if (f === 'upcoming') panels['upcoming-panel'] = true;
  else                       panels['task-content']   = true;

  Object.entries(panels).forEach(([id, show]) => {
    document.getElementById(id).style.display = show ? '' : 'none';
  });

  if (f === 'logbook') {
    renderLogbook();
  } else if (f === 'upcoming') {
    renderUpcoming();
  } else if (isAreaFilter(f)) {
    renderAreaProjects(f);
  } else {
    render();
  }
}

function renderAreaProjects(areaName) {
  const all = allTasks();
  const tA = t => state[t.id]?.areaOverride    || t.area;
  const tS = t => state[t.id]?.sectionOverride || t.section;
  const secMap = {};
  all.filter(t => !state[t.id]?.completed && tA(t) === areaName)
     .forEach(t => { const s = tS(t); secMap[s] = (secMap[s]||0) + 1; });

  const mainTasks = document.getElementById("main-tasks");
  document.getElementById("done-section").innerHTML = "";
  document.getElementById("task-content").classList.remove("draggable-view");

  if (!Object.keys(secMap).length) {
    mainTasks.innerHTML = `<div class="inbox-empty"><div class="inbox-empty-icon">📂</div>No projects yet</div>`;
    return;
  }

  // Filter out deleted sections
  const deletedSections = Object.keys(sectionNameOverrides[areaName] || {})
    .filter(k => k.startsWith('_hidden_'))
    .map(k => k.replace('_hidden_', ''));
  Object.keys(secMap).forEach(s => { if (deletedSections.includes(s)) delete secMap[s]; });

  // Apply stored project order
  const storedOrder = state._projectOrder?.[areaName];
  let entries = Object.keys(secMap);
  if (storedOrder) {
    entries = [...storedOrder.filter(s => secMap[s]), ...entries.filter(s => !storedOrder.includes(s))];
  }

  const folderSVG = `<svg viewBox="0 0 20 16" width="20" height="16" fill="none"><path d="M1 3.5A1.5 1.5 0 012.5 2H7l2 2h8.5A1.5 1.5 0 0119 5.5V13a1.5 1.5 0 01-1.5 1.5h-15A1.5 1.5 0 011 13V3.5z" stroke="currentColor" stroke-width="1.5"/></svg>`;
  const chevSVG  = `<svg viewBox="0 0 8 14" width="8" height="14" fill="none"><polyline points="1,1 7,7 1,13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const gripSVG  = `<svg viewBox="0 0 10 16" width="10" height="16" fill="currentColor"><circle cx="3" cy="3" r="1.5"/><circle cx="7" cy="3" r="1.5"/><circle cx="3" cy="8" r="1.5"/><circle cx="7" cy="8" r="1.5"/><circle cx="3" cy="13" r="1.5"/><circle cx="7" cy="13" r="1.5"/></svg>`;

  const renamePencil = `<button class="rename-btn" onclick="openRenameSection('${areaName.replace(/'/g,"\\'")}',arguments[0] || name, event)" title="Rename project" style="margin-left:4px">${pencilSVG}</button>`;
  mainTasks.innerHTML = `<div class="project-list">${
    entries.map(name => {
      const count = secMap[name];
      const displayName = getSectionLabel(areaName, name);
      const safeName = name.replace(/'/g,"\\'");
      const safeArea = areaName.replace(/'/g,"\\'");
      return `<button class="project-card" data-proj="${name.replace(/"/g,'&quot;')}" onclick="enterSection('${safeName}','${safeArea}')">
        <div class="project-drag-handle" onclick="event.stopPropagation()">${gripSVG}</div>
        <div class="project-card-icon">${folderSVG}</div>
        <div class="project-card-body">
          <div class="project-card-name" style="display:flex;align-items:center;gap:4px">${displayName}<span class="rename-btn" onclick="openRenameSection('${safeArea}','${safeName}',event)" title="Rename project">${pencilSVG}</span></div>
          <div class="project-card-count">${count} task${count!==1?'s':''}</div>
        </div>
        <div class="project-card-arrow">${chevSVG}</div>
      </button>`;
    }).join("")
  }</div>`;
  setTimeout(initProjectDragHandlers, 40);
}

function enterSection(secName, areaName) {
  navStack.push({
    filter: currentFilter,
    sectionCtx: currentSectionCtx ? {...currentSectionCtx} : null,
    title: document.getElementById('view-title').textContent

  currentFilter = "__sec__";
  currentSectionCtx = { name: secName, area: areaName };

  document.getElementById('logbook-panel').style.display = 'none';
  document.getElementById('upcoming-panel').style.display = 'none';

}


function toggleSection(cardId) {

function subRowHTML(taskId, sub, idx) {

function toggleMoveRow(id) {

function updateMoveSections(taskId) {

function confirmMove(taskId) {
  const area    = document.getElementById("move-area-" + taskId)?.value;
  const section = document.getElementById("move-sec-"  + taskId)?.value;
  if (!area) return;

    dynamicTasks[idx] = { ...dynamicTasks[idx], area, section: section || sectionsForArea(area)[0] || "Other" };
    saveDynamicTasks();
  }
  delete state[taskId + "__moveOpen"];
  saveState(); render();
}

// ── Logbook ───────────────────────────────────────────────────────────────
function dateGroupLabel(dateStr) {
  const today     = new Date().toLocaleDateString("en-CA");
  const yesterday = new Date(Date.now() - 86400000).toLocaleDateString("en-CA");
  if (!dateStr)            return "Earlier";
  if (dateStr === today)   return "Today";
  if (dateStr === yesterday) return "Yesterday";
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
  if (diff <= 7)  return "This Week";
  if (diff <= 30) return "This Month";
  return "Earlier";
}

function renderLogbook() {
  const el  = document.getElementById("logbook-main");
  const all = allTasks();
  const completed = all.filter(t => !!state[t.id]?.completed);

  // Pre-seeded completed task
  const preTask = { id:"__pre__", title:"Invoice follow-up — Nina Maravic / Vancouver Catering",
    detail:"Vancouver Opera order, 24 bottles, 10% discount, downtown delivery", area:"shop",
    completedAt:"2026-04-19", tags:[], subtasks:[] };
  const rows = [
    ...completed.map(t => ({ ...t, completedAt: state[t.id].completedAt })),
    ...(completed.find(t => t.id==="__pre__") ? [] : [preTask])
  ].sort((a,b) => (b.completedAt||"").localeCompare(a.completedAt||""));

  if (!rows.length) {
    el.innerHTML = `<div class="logbook-empty">No completed tasks yet</div>`;
    return;
  }

  // Group by date label
  const groups = {};
  const order  = [];
  rows.forEach(t => {
    const lbl = dateGroupLabel(t.completedAt);
    if (!groups[lbl]) { groups[lbl] = []; order.push(lbl); }
    groups[lbl].push(t);
  });

  el.innerHTML = order.map(lbl => `
    <div class="logbook-date-header">${lbl}</div>
    ${groups[lbl].map(t => `
      <div class="task-row is-done">
        <div class="check-wrap">
          <input type="checkbox" class="task-check" checked onchange="toggleTask('${t.id}')">
          <div class="check-circle">${checkSVG}</div>
        </div>
        <div class="task-body">
          <div class="task-title">${t.title}</div>
          ${t.detail ? `<div class="task-detail">${t.detail}</div>` : ""}
          <div class="done-stamp"><svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg> ${t.completedAt || ""}</div>
        </div>
      </div>`).join("")}
  `).join("");
}

function taskRowHTML(t) {
  const isDone       = !!state[t.id]?.completed;
  const isOverdue    = t.tags.includes("overdue") && !isDone;
  const todayRowStr  = new Date().toLocaleDateString("en-CA");
  const dueDate      = state[t.id]?.due || null;
  const isToday      = (!isDone) && (!!state[t.id]?.today || dueDate === todayRowStr);
  const noteOpen     = !!state[t.id]?.noteOpen && !isDone;
  const noteText     = state[t.id]?.note || "";
  const hasNote      = !!noteText;
  const subInputOpen = !!state[t.id]?.subtaskInput && !isDone;
  const dynSubs      = state[t.id]?.dynamicSubtasks || [];

  const badges = t.tags.length && !isDone
    ? `<div class="task-meta">${t.tags.map(tg => `<span class="badge ${BADGE_MAP[tg].cls}">${BADGE_MAP[tg].label}</span>`).join("")}</div>`
    : "";
  const stamp = isDone
    ? `<div class="done-stamp"><svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg> ${state[t.id].completedAt}</div>`
    : "";

  // Sub-tasks
  let subHTML = "";
  if (!isDone) {
    const staticSubs = t.subtasks || [];
    const staticDone = staticSubs.filter((_,i) => state[t.id+"__sub__"+i]?.completed).length;
    const dynDone    = dynSubs.filter((_,i) => state[t.id+"__dynsub__"+i]?.completed).length;
    const subTotal   = staticSubs.length + dynSubs.length;
    const subDone    = staticDone + dynDone;
    const allDone    = subTotal > 0 && subDone === subTotal;
    const isOpen     = !!state[t.id+"__open"];

    // Subtask indicator icon (clickable) replaces the verbose "0/4 steps" pip
    let pipHTML = subTotal > 0 ? `
      <div class="subtask-toggle-icon" onclick="toggleSubtasks('${t.id}')" title="${subDone}/${subTotal} steps">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="2.5" cy="3.5" r="1" fill="currentColor" stroke="none"/><circle cx="2.5" cy="6.5" r="1" fill="currentColor" stroke="none"/><circle cx="2.5" cy="9.5" r="1" fill="currentColor" stroke="none"/><line x1="5" y1="3.5" x2="11" y2="3.5"/><line x1="5" y1="6.5" x2="11" y2="6.5"/><line x1="5" y1="9.5" x2="9" y2="9.5"/></svg>
        ${allDone ? `<svg class="sub-all-done-check" width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="var(--green)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>` : ""}
      </div>` : "";

    const showRows = isOpen || (subInputOpen && subTotal === 0);
    let rowsHTML = "";
    if (showRows) {
      rowsHTML += staticSubs.map((sub,i) => subRowHTML(t.id, sub, i)).join("");
      rowsHTML += dynSubs.map((sub,i) => `
        <div class="subtask-row${state[t.id+"__dynsub__"+i]?.completed?" is-done":""}">
          <div class="sub-check-wrap">
            <input type="checkbox" class="task-check" ${state[t.id+"__dynsub__"+i]?.completed?"checked":""} onchange="toggleDynSubtask('${t.id}',${i})">
            <div class="sub-check-circle">${checkSVG}</div>
          </div>
          <div class="subtask-title">${sub}</div>
          <button class="dyn-sub-del" onclick="removeDynamicSubtask('${t.id}',${i})" title="Remove">×</button>
        </div>`).join("");
      if (subInputOpen) rowsHTML += `
        <div class="new-sub-row">
          <input class="new-sub-input" id="newsub-${t.id}" type="text" placeholder="Add step…"
            onkeydown="if(event.key==='Enter')confirmNewSubtask('${t.id}');if(event.key==='Escape')toggleSubtaskInput('${t.id}')">
          <span class="new-sub-hint">↵ to save</span>
        </div>`;
    } else if (subInputOpen) {
      rowsHTML += `
        <div class="new-sub-row">
          <input class="new-sub-input" id="newsub-${t.id}" type="text" placeholder="Add step…"
            onkeydown="if(event.key==='Enter')confirmNewSubtask('${t.id}');if(event.key==='Escape')toggleSubtaskInput('${t.id}')">
          <span class="new-sub-hint">↵ to save</span>
        </div>`;
    }

    if (subTotal > 0 || subInputOpen) {
      subHTML = `<div class="subtask-rows${showRows||subInputOpen?" expanded":""}">${rowsHTML}</div>`;
    }
  }

  // Note area
  let noteHTML = "";
  if (!isDone) {
    if (noteOpen) {
      noteHTML = `<div class="note-area"><textarea class="note-textarea" id="note-${t.id}"
        oninput="saveNote('${t.id}',this.value)"
        onkeydown="if(event.key==='Escape')toggleNote('${t.id}')"
        placeholder="Add a note…">${noteText}</textarea></div>`;
    } else if (hasNote) {
      noteHTML = `<div class="task-note-display">${noteText}</div>`;
    }
  }

  // Inline indicators: [priority dot] [note icon] [subtask icon]
  const subTotal2  = (t.subtasks||[]).length + dynSubs.length;
  const priority   = state[t.id]?.priority || 'none';
  const noteIconSVG = `<svg width="12" height="13" viewBox="0 0 12 13" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="1" width="9" height="11" rx="1.5"/><line x1="3.5" y1="4.5" x2="8.5" y2="4.5"/><line x1="3.5" y1="6.8" x2="8.5" y2="6.8"/><line x1="3.5" y1="9.1" x2="6.5" y2="9.1"/></svg>`;
  const subIconSVG  = `<svg width="12" height="13" viewBox="0 0 12 13" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"><circle cx="2.5" cy="3.5" r="1" fill="currentColor" stroke="none"/><circle cx="2.5" cy="6.5" r="1" fill="currentColor" stroke="none"/><circle cx="2.5" cy="9.5" r="1" fill="currentColor" stroke="none"/><line x1="5" y1="3.5" x2="10.5" y2="3.5"/><line x1="5" y1="6.5" x2="10.5" y2="6.5"/><line x1="5" y1="9.5" x2="9" y2="9.5"/></svg>`;
  let indicators = "";
  if (!isDone && priority !== 'none') indicators += `<span class="ind-priority p-${priority}" onclick="cyclePriority('${t.id}',event)" title="Priority"></span>`;
  if (hasNote)                        indicators += noteIconSVG;
  if (subTotal2 > 0)                  indicators += `<span class="ind-subtask" onclick="toggleSubtasks('${t.id}')" title="Steps">${subIconSVG}</span>`;
  const indicatorsHTML = indicators ? `<span class="task-indicators">${indicators}</span>` : "";

  // Action buttons
  const flagSVG = `<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="7,1.5 8.6,5.2 12.5,5.6 9.7,8.1 10.5,12 7,10 3.5,12 4.3,8.1 1.5,5.6 5.4,5.2"/></svg>`;
  const noteSVG = `<svg viewBox="0 0 14 14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M2 2h10v8H8l-2 2V10H2V2z"/></svg>`;
  const plusSVG = `<svg viewBox="0 0 14 14" stroke-width="2.2" stroke-linecap="round" fill="none"><line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/></svg>`;

  const actions = "";

  const gripSVG = `<svg viewBox="0 0 10 16" width="10" height="16" fill="currentColor"><circle cx="3" cy="3" r="1.5"/><circle cx="7" cy="3" r="1.5"/><circle cx="3" cy="8" r="1.5"/><circle cx="7" cy="8" r="1.5"/><circle cx="3" cy="13" r="1.5"/><circle cx="7" cy="13" r="1.5"/></svg>`;

  return `
    <div class="task-row${isDone?" is-done":""}${isToday?" is-today":""}" data-task-id="${t.id}" id="trow-${t.id}">
      <div class="drag-handle" title="Drag to reorder">${gripSVG}</div>
      <div class="check-wrap">
        <input type="checkbox" class="task-check" ${isDone?"checked":""} onchange="toggleTask('${t.id}')">
        <div class="check-circle">${checkSVG}</div>
      </div>
      <div class="task-body">
        <div class="task-title" style="${isDone?"":"cursor:pointer"}" onclick="${isDone?"void(0)":"openEditTask('"+t.id+"')"}"><span class="task-title-text">${t.title}</span>${indicatorsHTML}</div>
        ${noteOpen ? noteHTML : ""}
        ${subHTML}
      </div>
      ${actions}
    </div>`;
}

function render() {
  const mainTasks = document.getElementById("main-tasks");
  const doneSec   = document.getElementById("done-section");
  const all       = allTasks();

  const todayStr = new Date().toLocaleDateString("en-CA");
  // Resolve effective area/section (may be overridden in state)
  const tArea    = t => state[t.id]?.areaOverride    || t.area;
  const tSection = t => state[t.id]?.sectionOverride || t.section;

  const visible = all.filter(t => {
    if (state[t.id]?.completed) return false;
    // Hide deferred tasks until their defer date arrives
    if (state[t.id]?.defer && state[t.id].defer > todayStr) return false;
    if (currentFilter === "today")   return !!state[t.id]?.today || state[t.id]?.due === todayStr;
    if (currentFilter === "inbox")   return tArea(t) === "inbox";
    if (currentFilter === "all")     return tArea(t) !== "inbox";
    if (currentFilter === "__sec__") return currentSectionCtx && tArea(t) === currentSectionCtx.area && tSection(t) === currentSectionCtx.name;
    return tArea(t) === currentFilter;
  });

  function applyOrder(tasks) {
    const key = currentFilter === "__sec__"
      ? `sec:${currentSectionCtx?.name}:${currentSectionCtx?.area}`
      : currentFilter;
    const order = state._order?.[key];
    if (!order) return tasks;
    const om = {}; order.forEach((id,i) => om[id]=i);
    return [...tasks].sort((a,b) => (om[a.id]??9999)-(om[b.id]??9999));
  }

  // Group by section
  const secMap = {};
  visible.forEach(t => {
    const a = tArea(t); const s = tSection(t);
    const k = a + "|" + s;
    if (!secMap[k]) secMap[k] = { area: a, name: s, tasks: [] };
    secMap[k].tasks.push(t);
  });

  // Define showPre first (used in multiple places)
  const showPre = (currentFilter === "all" || currentFilter === "shop") && currentFilter !== "today";

  // Done count
  let done = 0;
  visible.forEach(t => { if (state[t.id]?.completed) done++; });
  if (showPre) done++;

  // Sidebar counts
  const nc = (id, n) => { const el = document.getElementById(id); if (el) el.textContent = n > 0 ? n : ""; };
  const todayNc = new Date().toLocaleDateString("en-CA");
  nc("nc-inbox",    all.filter(t => t.area==="inbox" && !state[t.id]?.completed).length);
  nc("nc-today",    all.filter(t => !state[t.id]?.completed && (!!state[t.id]?.today || state[t.id]?.due === todayNc)).length);
  nc("nc-upcoming", all.filter(t => !state[t.id]?.completed && state[t.id]?.due && state[t.id].due > todayNc).length);
  nc("nc-shop",     all.filter(t => t.area==="shop"    && !state[t.id]?.completed).length);
  nc("nc-design",   all.filter(t => t.area==="design"  && !state[t.id]?.completed).length);
  nc("nc-personal", all.filter(t => t.area==="personal"&& !state[t.id]?.completed).length);
  nc("nc-logbook",  all.filter(t => !!state[t.id]?.completed).length + (showPre ? 1 : 0));

  // View subtitle
  const openCount = visible.filter(t => !state[t.id]?.completed).length;
  const sub = document.getElementById("view-subtitle");
  if (sub) sub.textContent = `${openCount} open task${openCount !== 1 ? "s" : ""}`;

  document.getElementById("task-content").classList.remove("draggable-view");

  // Inbox: flat task list with "Move to…" on each row
  if (currentFilter === "inbox") {
    if (!visible.length) {
      mainTasks.innerHTML = `<div class="inbox-empty"><div class="inbox-empty-icon">📭</div>Inbox is empty</div>`;
    } else {
      mainTasks.innerHTML = visible.map(t => inboxRowHTML(t)).join("");
    }
    doneSec.innerHTML = "";
    return;
  }

  // Today: flat list, draggable
  if (currentFilter === "today") {
    const ordered = applyOrder(visible);
    if (!ordered.length) {
      mainTasks.innerHTML = `<div class="inbox-empty"><div class="inbox-empty-icon">✓</div>Nothing flagged for today</div>`;
      document.getElementById("task-content").classList.remove("draggable-view");
    } else {
      document.getElementById("task-content").classList.add("draggable-view");
      mainTasks.innerHTML = ordered.map(taskRowHTML).join("");
      setTimeout(initDragHandlers, 30);
    }
    doneSec.innerHTML = "";
    return;
  }

  // Section view: flat task list, draggable
  if (currentFilter === "__sec__") {
    const ordered = applyOrder(visible);
    if (!ordered.length) {
      mainTasks.innerHTML = `<div class="inbox-empty"><div class="inbox-empty-icon">📋</div>No tasks in this project</div>`;
      document.getElementById("task-content").classList.remove("draggable-view");
    } else {
      document.getElementById("task-content").classList.add("draggable-view");
      mainTasks.innerHTML = ordered.map(taskRowHTML).join("");
      setTimeout(initDragHandlers, 30);
    }
    doneSec.innerHTML = "";
    return;
  }

  // Sections
  let lastArea = null;
  mainTasks.innerHTML = Object.values(secMap).map(sec => {
    const activeTasks = sec.tasks.filter(t => !state[t.id]?.completed);
    if (!activeTasks.length) return "";
    const openN  = activeTasks.length;
    const cardId = "card-" + (sec.area + sec.name).replace(/[^a-z0-9]/gi, "-");
    const rows   = activeTasks.map(taskRowHTML).join("");

    let areaHeader = "";
    if (currentFilter === "all" && sec.area !== lastArea) {
      lastArea = sec.area;
      areaHeader = `
        <div class="area-title">
          <span class="area-title-text">${getAreaLabel(sec.area)}</span>
          <div class="area-title-rule"></div>
        </div>`;
    }

    return `${areaHeader}
      <div class="section-group" id="${cardId}">
        <div class="section-header" onclick="toggleSection('${cardId}')">
          <span class="section-name">${getSectionLabel(sec.area, sec.name)}</span>
          <div class="section-right">
            <span class="section-open-count">${openN}</span>
            <div class="section-chevron"><svg viewBox="0 0 10 10"><polyline points="2,4 5,7 8,4"/></svg></div>
          </div>
        </div>
        <div class="section-tasks">${rows}</div>
      </div>`;
  }).join("");

  // Completed tasks
  const completedTasks = all.filter(t => state[t.id]?.completed && (currentFilter === "all" || t.area === currentFilter));
  const preRow = showPre ? `
    <div class="task-row is-done">
      <div class="check-wrap">
        <input type="checkbox" class="task-check" checked disabled>
        <div class="check-circle">${checkSVG}</div>
      </div>
      <div class="task-body">
        <div class="task-title">Invoice follow-up — Nina Maravic / Vancouver Catering</div>
        <div class="task-detail">Vancouver Opera order, 24 bottles, 10% discount, downtown delivery</div>
        <div class="done-stamp"><svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg> 2026-04-19</div>
      </div>
    </div>` : "";

  const completedRows = completedTasks.map(t => `
    <div class="task-row is-done">
      <div class="check-wrap">
        <input type="checkbox" class="task-check" checked onchange="toggleTask('${t.id}')">
        <div class="check-circle">${checkSVG}</div>
      </div>
      <div class="task-body">
        <div class="task-title">${t.title}</div>
        ${t.detail ? `<div class="task-detail">${t.detail}</div>` : ""}
        <div class="done-stamp"><svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg> ${state[t.id].completedAt}</div>
      </div>
    </div>`).join("");

  const allDone = preRow + completedRows;
  if (allDone) {
    doneSec.innerHTML = `
      <div class="done-group">
        <div class="done-group-header">
          <span class="done-group-label">Completed</span>
          <span class="done-count-badge">${done}</span>
        </div>
        ${allDone}
      </div>`;
  } else {
    doneSec.innerHTML = "";
  }
}

let _renameCtx = null; // { type:'area'|'section', areaId, sectionName }
const pencilSVG = `<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z"/></svg>`;

function openRenameArea(areaId, e) {

function openRenameSection(areaId, sectionName, e) {
  e.stopPropagation();

  document.getElementById("rename-modal-title").textContent = "Rename Project";
  document.getElementById("rename-input").value = getSectionLabel(areaId, sectionName);
  document.getElementById("rename-modal").classList.add("open");

}
function closeRenameModal() {
  document.getElementById("rename-modal").classList.remove("open");
  hideDeleteConfirm();
  _renameCtx = null;
}
function showDeleteConfirm() {
  const label = _renameCtx?.type === 'area'
    ? `"${getAreaLabel(_renameCtx.areaId)}"`
    : `"${getSectionLabel(_renameCtx?.areaId, _renameCtx?.sectionName)}"`;
  const type = _renameCtx?.type === 'area' ? 'area' : 'project';
  document.getElementById("delete-confirm-msg").textContent =
    `Delete ${type} ${label}? Tasks inside will be moved to Inbox.`;
  document.getElementById("rename-step").style.display = "none";
  document.getElementById("delete-confirm-step").style.display = "";
}
function hideDeleteConfirm() {
  document.getElementById("rename-step").style.display = "";
  document.getElementById("delete-confirm-step").style.display = "none";
}
function confirmDelete() {
  if (!_renameCtx) { closeRenameModal(); return; }
  if (_renameCtx.type === 'area') {
    const id = _renameCtx.areaId;
    // Move all tasks in this area to inbox
    allTasks().forEach(t => {
      const tA = state[t.id]?.areaOverride || t.area;
      if (tA === id) {
        state[t.id] = { ...(state[t.id] || {}), areaOverride: 'inbox' };
        delete state[t.id].sectionOverride;
      }
    });
    // Remove from customAreas if custom
    customAreas = customAreas.filter(a => a.id !== id);
    // Hide built-in areas by adding to overrides with a hidden flag
    if (['shop','design','personal'].includes(id)) {
      if (!areaNameOverrides._hidden) areaNameOverrides._hidden = [];
      if (!areaNameOverrides._hidden.includes(id)) areaNameOverrides._hidden.push(id);
    }
    delete areaNameOverrides[id];
    saveCustomMeta(); saveState(); schedPush();
    if (currentFilter === id) { currentFilter = 'all'; }
    rebuildSidebarAreas(); render();
  } else {
    const { areaId, sectionName } = _renameCtx;
    // Move all tasks in this section to inbox
    allTasks().forEach(t => {
      const tA = state[t.id]?.areaOverride || t.area;
      const tS = state[t.id]?.sectionOverride || t.section;
      if (tA === areaId && tS === sectionName) {
        state[t.id] = { ...(state[t.id] || {}), areaOverride: 'inbox' };
        delete state[t.id].sectionOverride;
      }
    });
    // Remove from customSections if custom
    if (customSections[areaId]) {
      customSections[areaId] = customSections[areaId].filter(s => s !== sectionName);
    }
    // Hide built-in sections
    if (!sectionNameOverrides[areaId]) sectionNameOverrides[areaId] = {};
    sectionNameOverrides[areaId]['_hidden_' + sectionName] = '__deleted__';
    if (sectionNameOverrides[areaId][sectionName]) delete sectionNameOverrides[areaId][sectionName];
    saveCustomMeta(); saveState(); schedPush();
    if (currentFilter === '__sec__' && currentSectionCtx?.name === sectionName) {
      currentFilter = areaId; currentSectionCtx = null;
    }
    renderAreaProjects(areaId);
  }
  closeRenameModal();
}
function confirmRename() {
  const val = document.getElementById("rename-input").value.trim();
  if (!val || !_renameCtx) { closeRenameModal(); return; }
  if (_renameCtx.type === 'area') {
    const id = _renameCtx.areaId;
    areaNameOverrides[id] = val;
    // Also update customAreas label if it's a custom area
    const ca = customAreas.find(a => a.id === id);
    if (ca) ca.label = val;
    saveCustomMeta();
    rebuildSidebarAreas();
    render();
  } else {
    const { areaId, sectionName } = _renameCtx;
    if (!sectionNameOverrides[areaId]) sectionNameOverrides[areaId] = {};
    sectionNameOverrides[areaId][sectionName] = val;
    // Also update customSections if it's a custom section
    if (customSections[areaId]) {
      const idx = customSections[areaId].indexOf(sectionName);
      if (idx > -1) customSections[areaId][idx] = val;
      // Move override to new canonical name
      sectionNameOverrides[areaId][val] = val;
      delete sectionNameOverrides[areaId][sectionName];
    }
    saveCustomMeta();
    if (isAreaFilter(currentFilter)) renderAreaProjects(currentFilter);
    else render();
  }
  closeRenameModal();
}

let modalDueDate    = null;
let modalRecur      = null;
let modalPriority   = null;

let calMonth = new Date().getMonth(); // 0-indexed

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS   = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function formatDueLabel(dateStr) {
  if (!dateStr) return "";
  const today = new Date().toLocaleDateString("en-CA");
  if (dateStr === today) return "Today";
  const d = new Date(dateStr + "T00:00:00");
  const diff = Math.round((d - new Date(today + "T00:00:00")) / 86400000);
  if (diff === 1)  return "Tomorrow";
  if (diff === -1) return "Yesterday";
  if (diff > 1 && diff < 7) return d.toLocaleDateString("en-CA", { weekday:"long" });
  return d.toLocaleDateString("en-CA", { month:"short", day:"numeric" });
}

const RECUR_LABELS = { daily:"Daily", weekly:"Weekly", biweekly:"Every 2 Weeks", monthly:"Monthly", yearly:"Yearly" };

function toggleRepeatPicker() {
  document.getElementById("repeat-picker").classList.toggle("open");
}

function setRepeat(val) {
  modalRecur = val || null;
  updateRepeatTrigger();
  document.getElementById("repeat-picker").classList.remove("open");
}

function updateRepeatTrigger() {
  const btn   = document.getElementById("repeat-trigger-btn");
  const label = document.getElementById("repeat-trigger-label");
  if (!btn) return;
  // Update chips
  document.querySelectorAll(".repeat-chip").forEach(c => {
    c.classList.toggle("active", (c.dataset.recur || null) === (modalRecur || null));
  });
  if (modalRecur) {
    label.textContent = RECUR_LABELS[modalRecur] || modalRecur;
    btn.classList.add("is-set");
  } else {
    label.textContent = "Repeat?";
    btn.classList.remove("is-set");
  }
}

function calcDeferDate(key) {
  const d = new Date(); d.setHours(0,0,0,0);
  if (key === 'tomorrow')  { d.setDate(d.getDate()+1); }
  else if (key === 'weekend') {
    const day = d.getDay(); // 0=Sun,6=Sat
    const daysUntilSat = day === 6 ? 7 : (6 - day);
    d.setDate(d.getDate() + daysUntilSat);
  }
  else if (key === 'nextweek')  { const mon = (d.getDay()+6)%7; d.setDate(d.getDate()+(7-mon)); }
  else if (key === 'nextmonth') { d.setMonth(d.getMonth()+1); d.setDate(1); }
  return d.toLocaleDateString("en-CA");
}

function toggleDeferPicker() {
  document.getElementById("defer-picker").classList.toggle("open");
  document.getElementById("repeat-picker").classList.remove("open");
}

function setDefer(key) {
  modalDefer = key ? calcDeferDate(key) : null;
  updateDeferTrigger();
  document.getElementById("defer-picker").classList.remove("open");
}

function updateDeferTrigger() {
  const btn   = document.getElementById("defer-trigger-btn");
  const label = document.getElementById("defer-trigger-label");
  if (!btn) return;
  document.querySelectorAll(".defer-chip").forEach(c => c.classList.remove("active"));
  if (modalDefer) {
    label.textContent = "Until " + formatDueLabel(modalDefer);
    btn.classList.add("is-set");
  } else {
    label.textContent = "Defer?";
    btn.classList.remove("is-set");
  }
}

function renderModalSubtasks(staticSubs) {
  staticSubs = staticSubs || [];
  const list = document.getElementById("modal-subtask-list");
  if (!list) return;
  const id = editingTaskId;

  const circleSVG = (done) => done
    ? `<svg viewBox="0 0 22 22" width="22" height="22"><circle cx="11" cy="11" r="9" fill="var(--blue)" stroke="var(--blue)" stroke-width="1.5"/><polyline points="6.5,11 9.5,14 15.5,8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
    : `<svg viewBox="0 0 22 22" width="22" height="22"><circle cx="11" cy="11" r="9" fill="none" stroke="var(--blue)" stroke-width="1.8"/></svg>`;

  const staticRows = staticSubs.map((sub, i) => {
    const done = id ? !!state[id+"__sub__"+i]?.completed : false;
    return `<div class="ms-row${done?" ms-done":""}">
      <span class="ms-circle" onclick="toggleModalStaticSub(${i})">${circleSVG(done)}</span>

  }).join("");

  const dynRows = modalSubtasks.map((sub, i) => {
    const done = id ? !!state[id+"__dynsub__"+i]?.completed : false;
    return `<div class="ms-row${done?" ms-done":""}">
      <span class="ms-circle" onclick="toggleModalDynSub(${i})">${circleSVG(done)}</span>
      <span class="ms-label">${sub}</span>
      <button class="ms-del" onclick="removeModalSubtask(${i})" title="Remove">×</button>
    </div>`;
  }).join("");

  list.innerHTML = staticRows + dynRows;
}

function toggleModalStaticSub(i) {
  const id = editingTaskId; if (!id) return;
  const key = id+"__sub__"+i;
  state[key] = { ...(state[key]||{}), completed: !state[key]?.completed };
  if (!state[key].completed) delete state[key].completed;
  saveState(); schedPush();
  const t = allTasks().find(t => t.id === id);
  renderModalSubtasks(t?.subtasks || []);
}

function toggleModalDynSub(i) {
  const id = editingTaskId; if (!id) return;
  const key = id+"__dynsub__"+i;
  state[key] = { ...(state[key]||{}), completed: !state[key]?.completed };
  if (!state[key].completed) delete state[key].completed;
  saveState(); schedPush();
  const t = allTasks().find(t => t.id === id);
  renderModalSubtasks(t?.subtasks || []);
}

function addModalSubtask() {
  const input = document.getElementById("modal-new-subtask");
  const val = input.value.trim();

  modalSubtasks.push(val);

function removeModalSubtask(i) {

function setModalPriority(val) {

function cyclePriority(id, e) {
  e.stopPropagation();
  const cur = state[id]?.priority || null;
  const next = cur === null ? "high" : cur === "high" ? "urgent" : null;
  state[id] = { ...(state[id] || {}) };
  if (next) state[id].priority = next;
  else delete state[id].priority;
  saveState(); schedPush(); render();
}

function updateWhenTrigger() {
  const btn   = document.getElementById("when-trigger-btn");
  const label = document.getElementById("when-trigger-label");
  if (!btn) return;
  btn.className = "when-trigger";
  if (!modalDueDate) { label.textContent = "When?"; return; }
  const today = new Date().toLocaleDateString("en-CA");
  if (modalDueDate === today) {
    label.textContent = "⭐ Today"; btn.classList.add("is-today-set");
  } else if (modalDueDate < today) {
    label.textContent = "⚠ " + formatDueLabel(modalDueDate); btn.classList.add("is-overdue");
  } else {
    label.textContent = formatDueLabel(modalDueDate); btn.classList.add("is-set");
  }
}

function openWhenPicker() {
  calYear  = new Date().getFullYear();
  calMonth = new Date().getMonth();
  if (modalDueDate) {
    const d = new Date(modalDueDate + "T00:00:00");
    calYear  = d.getFullYear();
    calMonth = d.getMonth();
  }
  renderCalendar();
  // Show/hide today check
  const today = new Date().toLocaleDateString("en-CA");
  document.getElementById("when-check-today").style.display = modalDueDate === today ? "" : "none";
  document.getElementById("when-clear-btn").style.display = modalDueDate ? "" : "none";
  document.getElementById("when-overlay").classList.add("open");
}

function closeWhenPicker() {
  document.getElementById("when-overlay").classList.remove("open");
}

function handleWhenOverlayClick(e) {
  if (e.target === document.getElementById("when-overlay")) closeWhenPicker();
}

function renderCalendar() {
  document.getElementById("when-cal-month").textContent = MONTHS[calMonth] + " " + calYear;
  const grid = document.getElementById("when-cal-grid");
  // Day-of-week headers
  let html = DAYS.map(d => `<div class="when-cal-dow">${d}</div>`).join("");

  const today = new Date().toLocaleDateString("en-CA");
  const firstDay = new Date(calYear, calMonth, 1);
  // Monday=0 offset
  let startOffset = (firstDay.getDay() + 6) % 7; // Mon-based
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  for (let i = 0; i < startOffset; i++) html += `<button class="when-cal-day empty" disabled></button>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = calYear + "-" + String(calMonth+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
    const isPast  = dateStr < today;
    const isTodayCal = dateStr === today;
    const isSel   = dateStr === modalDueDate;
    let cls = "when-cal-day";
    if (isPast)    cls += " past";
    if (isTodayCal) cls += " today-cal";
    if (isSel)     cls += " selected";
    html += `<button class="${cls}" ${isPast?"disabled":""} onclick="pickWhenDate('${dateStr}')">${d}</button>`;
  }
  grid.innerHTML = html;
}

function calPrev() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}
function calNext() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function pickWhenToday() {
  const today = new Date().toLocaleDateString("en-CA");
  modalDueDate = today;
  updateWhenTrigger();
  closeWhenPicker();
}

function pickWhenDate(dateStr) {
  modalDueDate = dateStr;
  updateWhenTrigger();
  closeWhenPicker();
}

function clearWhenDate() {
  modalDueDate = null;
  updateWhenTrigger();
  closeWhenPicker();
}

// ── Upcoming render ───────────────────────────────────────────────────────
function renderUpcoming() {
  const el  = document.getElementById("upcoming-main");
  const all = allTasks();
  const today = new Date().toLocaleDateString("en-CA");

  const tasks = all.filter(t =>
    !state[t.id]?.completed &&
    state[t.id]?.due &&
    state[t.id].due >= today &&
    !(state[t.id]?.defer && state[t.id].defer > today)
  ).sort((a,b) => (state[a.id]?.due || "").localeCompare(state[b.id]?.due || ""));

  if (!tasks.length) {
    el.innerHTML = `<div class="upcoming-empty">No upcoming tasks with due dates.<br>Set a date on a task to see it here.</div>`;
    return;
  }

  // Group by date
  const groups = {};
  const order  = [];
  tasks.forEach(t => {
    const d = state[t.id].due;
    if (!groups[d]) { groups[d] = []; order.push(d); }
    groups[d].push(t);
  });

  el.innerHTML = order.map(dateStr => {
    const d       = new Date(dateStr + "T00:00:00");
    const dayNum  = d.getDate();
    const dayName = dateStr === today ? "Today"
                  : d.toLocaleDateString("en-CA", { weekday:"long", month:"long" });
    const isToday = dateStr === today;
    return `
      <div class="upcoming-day">
        <div class="upcoming-day-header">
          <span class="upcoming-day-num${isToday?" is-today":""}">${dayNum}</span>
          <span class="upcoming-day-label">${dayName}</span>
        </div>
        ${groups[dateStr].map(t => taskRowHTML(t)).join("")}
      </div>`;
  }).join("");
}

// ── GitHub Gist Sync ─────────────────────────────────────────────────────
const GIST_ID = "93a2cf33d825df70c7273e2c257127b6";
const GIST_FILE = "tasks-sync.json";

function getToken() { return localStorage.getItem("tasks-gh-token") || ""; }

function setSyncDot(status) {
  const d = document.getElementById("sync-dot");
  if (!d) return;
  d.className = "sync-dot" + (status ? " " + status : "");
  d.title = status === "synced" ? "Synced ✓ (click to change token)"
          : status === "syncing" ? "Syncing…"
          : status === "error"   ? "Sync error — click to check token"
          : "Sync off — click to add token";
}

async function pushToGist() {
  const token = getToken(); if (!token) return;
  setSyncDot("syncing");
  const payload = {
    tasks_v2:                state,
    tasks_dynamic:           dynamicTasks,
    tasks_custom_areas:      customAreas,
    tasks_custom_sections:   customSections,
    tasks_area_renames:      areaNameOverrides,
    tasks_section_renames:   sectionNameOverrides,
    notes_pad:               localStorage.getItem("notes-pad") || ""
  };
  try {
    const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: "PATCH",
      headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(payload) } } })
    });
    setSyncDot(r.ok ? "synced" : "error");
  } catch(e) { setSyncDot("error"); }
}

async function pullFromGist() {
  const token = getToken(); if (!token) { setSyncDot(""); return; }
  setSyncDot("syncing");
  try {
    const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { Authorization: `token ${token}` }
    });
    if (!r.ok) { setSyncDot("error"); return; }
    const data = await r.json();
    const raw = data.files?.[GIST_FILE]?.content;
    if (!raw) { setSyncDot("synced"); return; }
    const p = JSON.parse(raw);
    // Only overwrite if remote has data
    if (p.tasks_v2 && Object.keys(p.tasks_v2).length > 0) {
      state = p.tasks_v2;
      localStorage.setItem("tasks-v2", JSON.stringify(state));
    }
    if (p.tasks_dynamic && p.tasks_dynamic.length > 0) {
      dynamicTasks = p.tasks_dynamic;
      localStorage.setItem("tasks-dynamic", JSON.stringify(dynamicTasks));
    }
    if (p.tasks_custom_areas) {
      customAreas = p.tasks_custom_areas;
      localStorage.setItem("tasks-custom-areas", JSON.stringify(customAreas));
    }
    if (p.tasks_custom_sections) {
      customSections = p.tasks_custom_sections;
      localStorage.setItem("tasks-custom-sections", JSON.stringify(customSections));
    }
    if (p.tasks_area_renames) {
      areaNameOverrides = p.tasks_area_renames;
      localStorage.setItem("tasks-area-renames", JSON.stringify(areaNameOverrides));
    }
    if (p.tasks_section_renames) {
      sectionNameOverrides = p.tasks_section_renames;
      localStorage.setItem("tasks-section-renames", JSON.stringify(sectionNameOverrides));
    }
    if (p.notes_pad) localStorage.setItem("notes-pad", p.notes_pad);
    setSyncDot("synced");
    rebuildSidebarAreas();
    render();
  } catch(e) { setSyncDot("error"); }
}

function schedPush() {

  _pushTimer = setTimeout(pushToGist, 1500);
}

// ── Natural language task input ──────────────────────────────────────────
function parseNaturalTask(input) {
  let text = input;
  let due = null, recur = null, priority = null;
  const today = new Date(); today.setHours(0,0,0,0);

  // Recurrence (check before dates)
  const recurMap = [
    { re: /\bevery\s+day\b|\bdaily\b/i,                              val: 'daily' },
    { re: /\bevery\s+2\s+weeks?\b|\bbiweekly\b|\bfortnightly\b/i,   val: 'biweekly' },
    { re: /\bevery\s+(mon|tue|wed|thu|fri|sat|sun)\w*\b|\bevery\s+week\b|\bweekly\b/i, val: 'weekly' },
    { re: /\bevery\s+month\b|\bmonthly\b/i,                          val: 'monthly' },
    { re: /\bevery\s+year\b|\byearly\b|\bannually\b/i,               val: 'yearly' },
  ];
  for (const { re, val } of recurMap) {
    if (re.test(text)) { recur = val; text = text.replace(re, ''); break; }
  }

  // Due dates
  const dueMap = [
    { re: /\btoday\b/i,       fn: () => new Date(today) },
    { re: /\btomorrow\b/i,    fn: () => { const d=new Date(today); d.setDate(d.getDate()+1); return d; } },
    { re: /\bthis\s+weekend\b|\bweekend\b/i, fn: () => {
      const d=new Date(today); const ds=d.getDay(); d.setDate(d.getDate()+(ds===6?7:6-ds)); return d;
    }},
    { re: /\bnext\s+week\b/i, fn: () => { const d=new Date(today); d.setDate(d.getDate()+7); return d; } },
    { re: /\bnext\s+month\b/i,fn: () => { const d=new Date(today); d.setMonth(d.getMonth()+1); d.setDate(1); return d; } },
    { re: /\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/i, fn: m => {
      const dw={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6};
      const d=new Date(today); const tgt=dw[m[1].toLowerCase()]; let diff=tgt-d.getDay(); if(diff<=0) diff+=7;
      d.setDate(d.getDate()+diff); return d;
    }},
    { re: /\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*\.?\s+(\d{1,2})\b/i, fn: m => {
      const mo={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
      const d=new Date(today.getFullYear(), mo[m[1].slice(0,3).toLowerCase()], parseInt(m[2]));
      if(d<today) d.setFullYear(d.getFullYear()+1); return d;
    }},
  ];
  for (const { re, fn } of dueMap) {
    const m = text.match(re);
    if (m) { due = fn(m).toLocaleDateString('en-CA'); text = text.replace(re, ''); break; }
  }

  // Priority
  if (/!urgent\b/i.test(text)) { priority='urgent'; text=text.replace(/!urgent\b/i,''); }
  else if (/!high\b/i.test(text)) { priority='high'; text=text.replace(/!high\b/i,''); }

  text = text.replace(/\s*,\s*$/, '').replace(/\s{2,}/g, ' ').trim();
  return { title: text || input.trim(), due, recur, priority };
}

let _nlApplied = { due: null, recur: null, priority: null };

function onTitleInput(val) {
  const saveBtn = document.getElementById("mt-save");
  if (saveBtn) saveBtn.disabled = !val.trim();

  // Don't parse when editing existing tasks
  if (editingTaskId) return;

  const parsed = parseNaturalTask(val);
  const preview = document.getElementById("nl-preview");
  const chips = [];

  if (parsed.due) {
    chips.push(`<button class="nl-chip nl-due" onclick="nlClear('due')" title="Remove">📅 ${formatDueLabel(parsed.due)} <span class="nl-x">×</span></button>`);
  }
  if (parsed.recur) {
    chips.push(`<button class="nl-chip nl-recur" onclick="nlClear('recur')" title="Remove">↻ ${RECUR_LABELS[parsed.recur]} <span class="nl-x">×</span></button>`);
  }
  if (parsed.priority === 'urgent') {
    chips.push(`<button class="nl-chip nl-urgent" onclick="nlClear('priority')" title="Remove">● Urgent <span class="nl-x">×</span></button>`);
  } else if (parsed.priority === 'high') {
    chips.push(`<button class="nl-chip nl-high" onclick="nlClear('priority')" title="Remove">● High <span class="nl-x">×</span></button>`);
  }

  preview.innerHTML = chips.join('');

  // Apply parsed values to modal state
  _nlApplied = { due: parsed.due, recur: parsed.recur, priority: parsed.priority };
  if (parsed.due    !== null) { modalDueDate = parsed.due;      updateWhenTrigger(); }
  if (parsed.recur  !== null) { modalRecur   = parsed.recur;    updateRepeatTrigger(); }
  if (parsed.priority !== null) { modalPriority = parsed.priority; setModalPriority(parsed.priority); }
}

function nlClear(field) {
  _nlApplied[field] = null;
  if (field === 'due')      { modalDueDate  = null; updateWhenTrigger(); }
  if (field === 'recur')    { modalRecur    = null; updateRepeatTrigger(); }
  if (field === 'priority') { modalPriority = null; setModalPriority(''); }
  // Re-parse without that field by clearing it from text is complex; just refresh preview
  onTitleInput(document.getElementById("mt-title").value);
}

// ── Project drag-to-reorder ───────────────────────────────────────────────
let _projDragName = null;

function initProjectDragHandlers() {
  document.querySelectorAll(".project-card[data-proj]").forEach(card => {
    card.draggable = true;
    card.addEventListener("dragstart", function() { _projDragName = this.dataset.proj; this.classList.add("dragging"); });
    card.addEventListener("dragover",  function(e) { e.preventDefault(); document.querySelectorAll(".project-card.drag-over").forEach(c=>c.classList.remove("drag-over")); this.classList.add("drag-over"); });
    card.addEventListener("dragleave", function() { this.classList.remove("drag-over"); });
    card.addEventListener("drop",      function(e) { e.preventDefault(); this.classList.remove("drag-over"); reorderProjects(_projDragName, this.dataset.proj); });
    card.addEventListener("dragend",   function() { _projDragName=null; document.querySelectorAll(".project-card").forEach(c=>c.classList.remove("dragging","drag-over")); });
    // Touch
    card.addEventListener("touchstart", _projTouchStart, { passive:true });
    card.addEventListener("touchmove",  _projTouchMove,  { passive:false });
    card.addEventListener("touchend",   _projTouchEnd);
  });
}

let _projTouchDrag = { active: false };
function _projTouchStart(e) {
  const name = this.dataset.proj; const card = this; const touch = e.touches[0];
  _projTouchDrag = { active:false, name, card, startX:touch.clientX, startY:touch.clientY, timer:null };
  _projTouchDrag.timer = setTimeout(() => {
    const rect = card.getBoundingClientRect();
    const ph = document.createElement("div");
    ph.style.cssText = `height:${rect.height}px;border-radius:12px;background:var(--blue-light);border:2px dashed var(--blue);margin-bottom:8px`;
    card.after(ph);
    Object.assign(card.style, {position:"fixed",left:rect.left+"px",top:rect.top+"px",width:rect.width+"px",zIndex:"999",opacity:"0.85",boxShadow:"0 8px 24px rgba(0,0,0,0.18)"});
    _projTouchDrag = { ..._projTouchDrag, active:true, ph, offsetY: touch.clientY-rect.top };
    if (navigator.vibrate) navigator.vibrate(50);
  }, 420);
}
function _projTouchMove(e) {
  if (!_projTouchDrag.name) return;
  if (!_projTouchDrag.active) {
    const t=e.touches[0];
    if (Math.abs(t.clientX-_projTouchDrag.startX)>8||Math.abs(t.clientY-_projTouchDrag.startY)>8) { clearTimeout(_projTouchDrag.timer); _projTouchDrag={active:false}; }
    return;
  }
  e.preventDefault();
  const t=e.touches[0];
  _projTouchDrag.card.style.top=(t.clientY-_projTouchDrag.offsetY)+"px";
  _projTouchDrag.card.style.display="none";
  const el=document.elementFromPoint(t.clientX,t.clientY);
  _projTouchDrag.card.style.display="";
  const target=el?.closest(".project-card[data-proj]");
  if(target&&target!==_projTouchDrag.card){ _projTouchDrag.dropName=target.dataset.proj; target.after(_projTouchDrag.ph); }
}
function _projTouchEnd() {
  if (!_projTouchDrag.name) return;
  clearTimeout(_projTouchDrag.timer);
  if (_projTouchDrag.active) {
    const card=_projTouchDrag.card;
    _projTouchDrag.ph?.remove();
    Object.assign(card.style,{position:"",left:"",top:"",width:"",zIndex:"",opacity:"",boxShadow:""});
    if (_projTouchDrag.dropName) reorderProjects(_projTouchDrag.name, _projTouchDrag.dropName);
  }
  _projTouchDrag={active:false};
}

function reorderProjects(fromName, toName) {
  if (!fromName || !toName || fromName === toName) return;
  const all = allTasks();
  const tA  = t => state[t.id]?.areaOverride    || t.area;
  const tS  = t => state[t.id]?.sectionOverride || t.section;
  // Get all sections for this area
  const secSet = [];
  all.filter(t => !state[t.id]?.completed && tA(t) === currentFilter)
     .forEach(t => { const s=tS(t); if(!secSet.includes(s)) secSet.push(s); });
  // Apply stored order first
  const stored = state._projectOrder?.[currentFilter];
  let order = stored ? [...stored] : secSet;
  // Ensure all current sections are represented
  secSet.forEach(s => { if(!order.includes(s)) order.push(s); });
  const from = order.indexOf(fromName), to = order.indexOf(toName);
  if (from < 0 || to < 0) return;
  order.splice(from,1); order.splice(to,0,fromName);
  if (!state._projectOrder) state._projectOrder = {};
  state._projectOrder[currentFilter] = order;
  saveState(); schedPush();
  renderAreaProjects(currentFilter);
  setTimeout(initProjectDragHandlers, 40);
}

// ── Search ───────────────────────────────────────────────────────────────
function openSearch() {
  currentFilter = "__search__";
  currentSectionCtx = null;
  navStack = [];
  document.getElementById("search-bar").classList.add("visible");
  document.getElementById("view-title").textContent = "Search";
  document.getElementById("view-subtitle").textContent = "";
  document.getElementById("task-content").style.display = "";
  document.getElementById("logbook-panel").style.display = "none";
  document.getElementById("upcoming-panel").style.display = "none";
  document.getElementById("task-content").classList.remove("draggable-view");
  document.getElementById("main-tasks").innerHTML = "";
  document.getElementById("done-section").innerHTML = "";
  document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
  if (isMobile()) mobileShowDetail();
  setTimeout(() => document.getElementById("search-input").focus(), 80);
}

function searchToggleTask(id, q) {
  toggleTask(id);
  setTimeout(() => doSearch(q), 50);
}

function closeSearch() {
  document.getElementById("search-bar").classList.remove("visible");
  document.getElementById("search-input").value = "";
  document.getElementById("search-clear").classList.remove("visible");
  currentFilter = "all";
  document.getElementById("view-title").textContent = "All Tasks";
  render();
  if (isMobile()) mobileGoBack();
}

function clearSearch() {
  document.getElementById("search-input").value = "";
  document.getElementById("search-clear").classList.remove("visible");
  document.getElementById("main-tasks").innerHTML = "";
  document.getElementById("search-input").focus();
}

function doSearch(q) {
  const clear = document.getElementById("search-clear");
  clear.classList.toggle("visible", q.length > 0);
  if (!q.trim()) { document.getElementById("main-tasks").innerHTML = ""; return; }

  const query = q.trim().toLowerCase();
  const all   = allTasks();
  const tA    = t => state[t.id]?.areaOverride    || t.area;
  const tS    = t => state[t.id]?.sectionOverride || t.section;

  const results = all.filter(t => {
    if (state[t.id]?.completed) return false;
    const title  = t.title.toLowerCase();
    const detail = (state[t.id]?.note || t.detail || "").toLowerCase();
    return title.includes(query) || detail.includes(query);
  });



  function highlight(text) {
    const idx = text.toLowerCase().indexOf(query);
    if (idx < 0) return text;
    return text.slice(0, idx) + "<mark>" + text.slice(idx, idx + query.length) + "</mark>" + text.slice(idx + query.length);
  }

  const priorityDotHTML = t => {
    const p = state[t.id]?.priority;
    if (!p) return "";
    const col = p === "urgent" ? "var(--red)" : "var(--orange)";
    return `<div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0;margin-top:5px"></div>`;
  };

  if (!results.length) {
    document.getElementById("main-tasks").innerHTML = `<div class="search-empty">No tasks matching "<strong>${q}</strong>"</div>`;
    return;
  }

  const lastQ = q;
  document.getElementById("main-tasks").innerHTML = results.map(t => {
    const areaName = getAreaLabel(tA(t));
    const context  = `${areaName} › ${tS(t)}`;
    return `<div class="search-result">
      <div class="check-wrap" onclick="searchToggleTask('${t.id}','${lastQ}')">
        <input type="checkbox" class="task-check">
        <div class="check-circle">${checkSVG}</div>
      </div>
      ${priorityDotHTML(t)}
      <div class="search-result-body" onclick="openEditTask('${t.id}')">
        <div class="search-result-title">${highlight(t.title)}</div>
        <div class="search-result-context">${context}</div>
      </div>
    </div>`;
  }).join("");
}

// ── Drag to reorder ──────────────────────────────────────────────────────
let _dragId = null;
let _touchDrag = { active: false };

function _getOrderKey() {
  if (currentFilter === "__sec__" && currentSectionCtx)
    return `sec:${currentSectionCtx.name}:${currentSectionCtx.area}`;
  return currentFilter;
}

function _reorder(fromId, toId) {
  if (!fromId || !toId || fromId === toId) return;
  const all = allTasks();
  const todayStr = new Date().toLocaleDateString("en-CA");
  const tA = t => state[t.id]?.areaOverride    || t.area;
  const tS = t => state[t.id]?.sectionOverride || t.section;
  let vis = all.filter(t => {
    if (state[t.id]?.completed) return false;
    if (currentFilter === "today") return !!state[t.id]?.today || state[t.id]?.due === todayStr;
    if (currentFilter === "__sec__") return currentSectionCtx && tA(t)===currentSectionCtx.area && tS(t)===currentSectionCtx.name;
    return false;
  });
  const key = _getOrderKey();
  const order = state._order?.[key];
  if (order) {
    const om = {}; order.forEach((id,i) => om[id]=i);
    vis = [...vis].sort((a,b) => (om[a.id]??9999)-(om[b.id]??9999));
  }
  const ids = vis.map(t => t.id);
  const from = ids.indexOf(fromId), to = ids.indexOf(toId);
  if (from < 0 || to < 0) return;
  ids.splice(from, 1);
  ids.splice(to, 0, fromId);
  if (!state._order) state._order = {};
  state._order[key] = ids;
  saveState(); schedPush(); render();
  setTimeout(initDragHandlers, 40);
}

// HTML5 drag
function _onDragStart(e) { _dragId = this.dataset.taskId; this.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; }
function _onDragOver(e)  { e.preventDefault(); document.querySelectorAll(".drag-over").forEach(el=>el.classList.remove("drag-over")); this.classList.add("drag-over"); }
function _onDragLeave()  { this.classList.remove("drag-over"); }
function _onDrop(e)      { e.preventDefault(); const tid=this.dataset.taskId; this.classList.remove("drag-over"); _reorder(_dragId, tid); _dragId=null; }
function _onDragEnd()    { _dragId=null; document.querySelectorAll(".dragging,.drag-over").forEach(el=>el.classList.remove("dragging","drag-over")); }

// Touch drag
function _onTouchStart(e) {
  const id = this.dataset.taskId;
  const touch = e.touches[0];
  const row = this;
  _touchDrag = { active: false, id, row, startX: touch.clientX, startY: touch.clientY, timer: null };
  _touchDrag.timer = setTimeout(() => {
    const rect = row.getBoundingClientRect();
    const ph = document.createElement("div");
    ph.className = "drag-placeholder"; ph.style.height = rect.height + "px";
    row.after(ph);
    Object.assign(row.style, { position:"fixed", left:rect.left+"px", top:(touch.clientY-(touch.clientY-rect.top))+"px", width:rect.width+"px", zIndex:"999", opacity:"0.85", boxShadow:"0 8px 24px rgba(0,0,0,0.18)", borderRadius:"10px" });
    _touchDrag = { ..._touchDrag, active:true, ph, offsetY: touch.clientY - rect.top };
    if (navigator.vibrate) navigator.vibrate(50);
  }, 420);
}
function _onTouchMove(e) {
  if (!_touchDrag.id) return;
  if (!_touchDrag.active) {
    const t = e.touches[0];
    if (Math.abs(t.clientX-_touchDrag.startX)>8 || Math.abs(t.clientY-_touchDrag.startY)>8) {
      clearTimeout(_touchDrag.timer); _touchDrag = { active:false };
    }
    return;
  }
  e.preventDefault();
  const t = e.touches[0];
  _touchDrag.row.style.top = (t.clientY - _touchDrag.offsetY) + "px";
  _touchDrag.row.style.display = "none";
  const el = document.elementFromPoint(t.clientX, t.clientY);
  _touchDrag.row.style.display = "";
  const target = el?.closest("[data-task-id]");
  if (target && target !== _touchDrag.row) {
    _touchDrag.dropId = target.dataset.taskId;
    target.after(_touchDrag.ph);
  }
}
function _onTouchEnd() {
  if (!_touchDrag.id) return;
  clearTimeout(_touchDrag.timer);
  if (_touchDrag.active) {
    const row = _touchDrag.row;
    _touchDrag.ph?.remove();
    Object.assign(row.style, { position:"", left:"", top:"", width:"", zIndex:"", opacity:"", boxShadow:"", borderRadius:"" });
    if (_touchDrag.dropId) _reorder(_touchDrag.id, _touchDrag.dropId);
  }
  _touchDrag = { active: false };
}

function initDragHandlers() {
  if (currentFilter !== "today" && currentFilter !== "__sec__") return;
  document.querySelectorAll("[data-task-id]").forEach(row => {
    row.draggable = true;
    row.addEventListener("dragstart",  _onDragStart);
    row.addEventListener("dragover",   _onDragOver);
    row.addEventListener("dragleave",  _onDragLeave);
    row.addEventListener("drop",       _onDrop);
    row.addEventListener("dragend",    _onDragEnd);
    row.addEventListener("touchstart", _onTouchStart, { passive: true });
    row.addEventListener("touchmove",  _onTouchMove,  { passive: false });
    row.addEventListener("touchend",   _onTouchEnd);
  });
}

// On mobile, tapping a nav item should drill into detail
const _origSetFilter = setFilter;
// Wrap setFilter to trigger mobile slide after render
const _nativeSetFilter = window.setFilter;
// Patch nav-item clicks to slide on mobile
document.querySelectorAll(".nav-item").forEach(btn => {
  btn.addEventListener("click", () => {
    if (isMobile()) mobileShowDetail();
  });
});

// ── App Icon Generator ───────────────────────────────────────────────────────
(function buildAppIcons() {
  function drawIcon(size) {
    const c = document.createElement("canvas");
    c.width = c.height = size;
    const ctx = c.getContext("2d");
    const r = size * 0.22; // corner radius

    // Rounded rect clip
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.clip();

    // Background gradient: sky blue → deep blue
    const bg = ctx.createLinearGradient(0, 0, 0, size);
    bg.addColorStop(0, "#3D9BFF");
    bg.addColorStop(1, "#0055D4");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, size, size);

    // Subtle top gloss
    const gloss = ctx.createLinearGradient(0, 0, 0, size * 0.5);
    gloss.addColorStop(0, "rgba(255,255,255,0.18)");
    gloss.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = gloss;
    ctx.fillRect(0, 0, size, size * 0.5);

    // Lightning bolt — coordinates in 100-unit space, scaled to size
    const s = size / 100;
    // 6-point bold bolt: pointed top, pointed bottom, wide thick body
    const bolt = [
      [60, 3],
      [16, 55],
      [48, 55],
      [40, 97],
      [84, 45],
      [52, 45]
    ];

    // Drop shadow for depth
    ctx.shadowColor = "rgba(0,30,100,0.35)";
    ctx.shadowBlur  = size * 0.06;
    ctx.shadowOffsetX = size * 0.01;
    ctx.shadowOffsetY = size * 0.03;

    // Bolt fill gradient: pure white top → icy blue bottom
    const boltGrad = ctx.createLinearGradient(50*s, 5*s, 50*s, 95*s);
    boltGrad.addColorStop(0, "#FFFFFF");
    boltGrad.addColorStop(1, "#C8E4FF");
    ctx.fillStyle = boltGrad;

    ctx.beginPath();
    ctx.moveTo(bolt[0][0]*s, bolt[0][1]*s);
    for (let i = 1; i < bolt.length; i++) ctx.lineTo(bolt[i][0]*s, bolt[i][1]*s);
    ctx.closePath();
    ctx.fill();

    ctx.shadowColor = "transparent";
    return c;
  }

  // 180×180 PNG for apple-touch-icon
  try {
    const link = document.getElementById("app-touch-icon");
    if (link) link.href = drawIcon(180).toDataURL("image/png");
  } catch(e) {}

  // Also upgrade the SVG favicon to a canvas-rendered PNG for better rendering
  try {
    const fav = document.querySelector("link[rel='icon']");
    if (fav) {
      fav.type = "image/png";
      fav.href = drawIcon(64).toDataURL("image/png");
    }
  } catch(e) {}
})();
